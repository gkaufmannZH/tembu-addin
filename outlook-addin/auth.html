<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="lib/msal-browser.min.js"></script>
</head>
<body>
<script>
/* globals Office, msal */
const CLIENT_ID    = '6a0f7ccb-afe3-4045-9b45-721d2046fafb';
const REDIRECT_URI = 'https://gkaufmannzh.github.io/tembu-addin/outlook-addin/auth.html';
const SCOPES       = ['User.Read', 'Tasks.ReadWrite', 'Contacts.Read', 'Mail.Read', 'Calendars.Read', 'Files.ReadWrite'];

const msalInstance = new msal.PublicClientApplication({
  auth: { clientId: CLIENT_ID, authority: 'https://login.microsoftonline.com/common', redirectUri: REDIRECT_URI },
  // storeAuthStateInCookie: der Office-Dialog-WebView übersteht die Navigation zu
  // login.microsoftonline.com und zurück nicht zuverlässig mit sessionStorage allein –
  // ohne dieses Flag verliert MSAL den PKCE/State und handleRedirectPromise() hängt/loopt.
  cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: true },
});

Office.initialize = async function () {
  try {
    if (msalInstance.initialize) await msalInstance.initialize();
    const response = await msalInstance.handleRedirectPromise();
    if (response && response.accessToken) {
      Office.context.ui.messageParent(JSON.stringify({
        success: true,
        token: response.accessToken,
        account: { name: response.account.name, username: response.account.username },
      }));
      return;
    }
    await msalInstance.loginRedirect({ scopes: SCOPES, prompt: 'select_account' });
  } catch (e) {
    Office.context.ui.messageParent(JSON.stringify({ success: false, error: e.message }));
  }
};
</script>
</body>
</html>
