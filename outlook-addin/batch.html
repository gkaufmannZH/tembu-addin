<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tembu Batch-Analyse</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .header { background: #2d5a5a; color: #fff; padding: 12px 20px 10px; flex-shrink: 0; }
    .header-title { font-size: 16px; font-weight: 700; }
    .header-sub { font-size: 11px; opacity: 0.75; margin-top: 2px; }

    /* Setup section */
    .setup { padding: 14px 20px; border-bottom: 1px solid #eee; flex-shrink: 0; }
    .setup-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .setup-label { font-size: 12px; color: #666; font-weight: 600; white-space: nowrap; }
    select { border: 1.5px solid #ddd; border-radius: 8px; padding: 7px 12px; font-size: 13px; font-family: inherit; color: #333; background: #fff; outline: none; cursor: pointer; }
    select:focus { border-color: #2d5a5a; }

    /* Folder list */
    .folder-section { padding: 12px 20px; border-bottom: 1px solid #eee; flex-shrink: 0; max-height: 220px; overflow-y: auto; }
    .folder-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: #666; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .folder-actions { display: flex; gap: 8px; }
    .folder-action-btn { font-size: 11px; color: #2d5a5a; background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; }
    .folder-loading { font-size: 12px; color: #aaa; }
    .folder-list { display: flex; flex-direction: column; gap: 4px; }
    .folder-item { display: flex; align-items: center; gap: 10px; padding: 5px 8px; border-radius: 6px; cursor: pointer; }
    .folder-item:hover { background: #f5f5f5; }
    .folder-item input[type="checkbox"] { accent-color: #2d5a5a; width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; }
    .folder-name { font-size: 13px; color: #333; flex: 1; }
    .folder-count { font-size: 11px; color: #aaa; }

    /* Action buttons */
    .action-bar { padding: 12px 20px; border-bottom: 1px solid #eee; flex-shrink: 0; display: flex; align-items: center; gap: 10px; }
    .btn { border-radius: 8px; padding: 8px 16px; font-size: 13px; font-family: inherit; cursor: pointer; border: 1.5px solid #ddd; font-weight: 600; }
    .btn-start  { background: #2d5a5a; color: #fff; border-color: #2d5a5a; }
    .btn-start:hover { opacity: 0.88; }
    .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-cancel { background: none; color: #c00; border-color: #c00; }
    .btn-cancel:hover { background: #fde8e8; }
    .btn-cancel.hidden { display: none; }
    .action-hint { font-size: 11px; color: #aaa; }

    /* Progress */
    .progress-area { padding: 12px 20px; border-bottom: 1px solid #eee; flex-shrink: 0; }
    .progress-bar-bg { height: 7px; background: #eee; border-radius: 4px; margin-bottom: 8px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: #2d5a5a; border-radius: 4px; transition: width 0.3s; width: 0%; }
    .progress-text { font-size: 13px; color: #444; margin-bottom: 2px; }
    .progress-current { font-size: 11px; color: #888; }
    .progress-stats { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; }
    .stat span { font-weight: 700; color: #2d5a5a; }
    .stat-skip span { color: #888; }
    .stat-err span { color: #c00; }

    /* Done box */
    .done-box { margin: 12px 20px; background: #e8f5e8; border-radius: 10px; padding: 12px 16px; display: none; flex-shrink: 0; }
    .done-box.visible { display: block; }
    .done-title { font-size: 14px; font-weight: 700; color: #2d6a2d; margin-bottom: 4px; }
    .done-text { font-size: 12px; color: #444; line-height: 1.6; }

    /* Log */
    .log { flex: 1; overflow-y: auto; padding: 8px 20px 16px; }
    .log-item { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid #f5f5f5; font-size: 12px; }
    .log-item:last-child { border-bottom: none; }
    .log-icon { flex-shrink: 0; width: 16px; text-align: center; }
    .log-name { flex: 1; color: #333; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-email { color: #bbb; flex-shrink: 0; max-width: 180px; overflow: hidden; text-overflow: ellipsis; font-size: 11px; }
    .log-status { flex-shrink: 0; font-size: 11px; color: #888; }
    .log-status.ok   { color: #2d6a2d; }
    .log-status.skip { color: #aaa; }
    .log-status.err  { color: #c00; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">Batch-Analyse</div>
    <div class="header-sub">Kontakte aus gewählten Ordnern analysieren und in OneDrive speichern</div>
  </div>

  <!-- KI-Einstellungen -->
  <div class="setup">
    <div class="setup-row">
      <span class="setup-label">KI</span>
      <select id="providerSelect" onchange="onProviderChange()">
        <option value="ollama">Ollama (lokal)</option>
        <option value="lmstudio">LM Studio</option>
        <option value="gemini">Gemini</option>
        <option value="anthropic">Claude</option>
        <option value="openai">OpenAI</option>
        <option value="groq">Groq</option>
      </select>
      <input id="apiKeyInput" type="password" placeholder="API Key" style="border:1.5px solid #ddd;border-radius:8px;padding:7px 10px;font-size:12px;flex:1;min-width:0;font-family:inherit;outline:none" class="hidden" />
      <input id="localEndpoint" type="text" placeholder="http://localhost:11434" style="border:1.5px solid #ddd;border-radius:8px;padding:7px 10px;font-size:12px;width:180px;font-family:inherit;outline:none" />
      <input id="localModel" type="text" placeholder="qwen2.5:14b" style="border:1.5px solid #ddd;border-radius:8px;padding:7px 10px;font-size:12px;width:120px;font-family:inherit;outline:none" />
      <button onclick="saveAIConfig()" style="background:#2d5a5a;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer">OK</button>
    </div>
    <div class="setup-row" style="margin-top:6px">
      <span class="setup-label">Zeitraum</span>
      <select id="sinceSelect">
        <option value="3">3 Monate</option>
        <option value="6">6 Monate</option>
        <option value="12" selected>1 Jahr</option>
        <option value="24">2 Jahre</option>
        <option value="60">5 Jahre</option>
        <option value="0">Alles</option>
      </select>
    </div>
    <div style="font-size:11px;color:#aaa;margin-top:6px">Analysierte Kontakte &lt; 24h werden übersprungen · Ollama: ~30–60s/Kontakt</div>
  </div>

  <!-- Folder picker -->
  <div class="folder-section">
    <div class="folder-section-title">
      Ordner
      <div class="folder-actions">
        <button class="folder-action-btn" onclick="selectAllFolders(true)">Alle</button>
        <button class="folder-action-btn" onclick="selectAllFolders(false)">Keine</button>
      </div>
    </div>
    <div class="folder-list" id="folderList">
      <span class="folder-loading">Lade Ordner…</span>
    </div>
  </div>

  <!-- Start / cancel -->
  <div class="action-bar">
    <button class="btn btn-start" id="btnStart" onclick="startBatch()" disabled>Analyse starten</button>
    <button class="btn btn-cancel hidden" id="btnCancel" onclick="cancelBatch()">Abbrechen</button>
    <span class="action-hint" id="actionHint"></span>
  </div>

  <!-- Progress -->
  <div class="progress-area hidden" id="progressArea">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Vorbereitung…</div>
    <div class="progress-current" id="progressCurrent"></div>
    <div class="progress-stats">
      <div class="stat">Analysiert: <span id="statDone">0</span></div>
      <div class="stat stat-skip">Übersprungen: <span id="statSkip">0</span></div>
      <div class="stat stat-err">Fehler: <span id="statErr">0</span></div>
    </div>
  </div>

  <div class="done-box" id="doneBox">
    <div class="done-title">✓ Batch-Analyse abgeschlossen</div>
    <div class="done-text" id="doneText"></div>
  </div>

  <div class="log" id="logList"></div>

  <script src="../shared/tembu-core.js?v=20260629i"></script>
  <script src="batch.js?v=20260629i"></script>
</body>
</html>
