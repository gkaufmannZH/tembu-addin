<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Tembu Kontakt-Detail</title>
  <script src="../shared/i18n.js?v=20260701i"></script>
  <style>
    /* ===== Tembu warm theme (Cornsilk / Russet / Olive) ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; background: #FEFAE0; color: #783D19; font-size: 14px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    .header { background: #FEFAE0; color: #783D19; padding: 18px 24px 16px; flex-shrink: 0; border-bottom: 1px solid #E6DFD3; }
    .header-name { font-size: 23px; font-weight: 800; letter-spacing: -0.5px; }
    .header-meta { font-size: 13px; color: #B99470; margin-top: 6px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }

    /* Settings bar */
    .settings-bar { background: #F9EBC7; border-bottom: 1px solid #E6DFD3; padding: 9px 24px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
    .settings-label { font-size: 11px; color: #8a7a5c; white-space: nowrap; font-weight: 700; }
    .settings-input { flex: 1; min-width: 180px; border: 1.5px solid #E0D5C0; border-radius: 7px; padding: 6px 10px; font-size: 12px; color: #783D19; background: #fff; outline: none; font-family: inherit; }
    .settings-input:focus { border-color: #5F6F52; }
    .settings-btn { background: #5F6F52; color: #FEFAE0; border: none; border-radius: 7px; padding: 6px 13px; font-size: 12px; cursor: pointer; white-space: nowrap; font-weight: 700; }
    .settings-btn:hover { background: #556348; }
    .settings-link { font-size: 11px; color: #5F6F52; text-decoration: none; white-space: nowrap; font-weight: 600; }
    .settings-link:hover { text-decoration: underline; }

    /* Tabs */
    .tab-bar { display: flex; border-bottom: 2px solid #E6DFD3; padding: 0 24px; flex-shrink: 0; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 11px 16px; font-size: 14px; font-weight: 700; color: #B99470; cursor: pointer; margin-bottom: -2px; transition: color 0.15s; }
    .tab-btn.active { color: #5F6F52; border-bottom-color: #5F6F52; }
    .tab-btn:hover { color: #5F6F52; }

    /* Tab content */
    .tab-content { flex: 1; overflow-y: auto; padding: 20px 24px 26px; }

    /* Stats */
    .stats-row { display: flex; gap: 10px; margin-bottom: 16px; }
    .stat-box { flex: 1; background: #F9EBC7; border-radius: 12px; padding: 14px 8px; text-align: center; }
    .stat-num { font-size: 26px; font-weight: 800; color: #783D19; line-height: 1; }
    .stat-label { font-size: 11px; color: #B99470; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.4px; font-weight: 600; }

    /* AI summary */
    .ai-box { background: #fff; border: 1px solid #E6DFD3; border-radius: 12px; padding: 16px 18px; margin-bottom: 16px; box-shadow: 0 2px 4px rgba(120,61,25,0.05); }
    .ai-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: #5F6F52; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .ai-text { font-size: 13.5px; color: #6b4f38; line-height: 1.65; }
    .ai-next { margin-top: 12px; padding-top: 12px; border-top: 1px solid #EFE6D3; font-size: 13px; color: #5a4632; }
    .ai-next strong { color: #5F6F52; }

    /* Open points */
    .section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.4px; color: #5F6F52; margin: 16px 0 8px; }
    .open-point { padding: 10px 14px; background: #F8EBD9; border-left: 3px solid #C4661F; border-radius: 0 8px 8px 0; margin-bottom: 7px; font-size: 13px; line-height: 1.45; color: #7a5030; }

    /* Cache info */
    .cache-info { font-size: 11px; color: #C4B393; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .refresh-link { color: #5F6F52; cursor: pointer; font-size: 11px; text-decoration: underline; font-weight: 600; }

    /* Timeline */
    .timeline-item { display: flex; gap: 12px; padding: 11px 0; border-bottom: 1px solid #F3ECDC; }
    .tl-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .tl-email-in  { background: #5F6F521A; }
    .tl-email-out { background: #F1E7CF; }
    .tl-meeting   { background: #A9B38830; }
    .tl-rumble    { background: #C4661F1A; }
    .tl-body { flex: 1; min-width: 0; }
    .tl-header { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .tl-date { font-size: 11px; color: #C4B393; flex-shrink: 0; margin-left: auto; }
    .tl-badge { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
    .b-email-in  { background: #5F6F521A; color: #5F6F52; }
    .b-email-out { background: #F1E7CF; color: #8a7a5c; }
    .b-meeting   { background: #A9B38830; color: #5f6a44; }
    .b-rumble    { background: #C4661F1A; color: #C4661F; }
    .tl-subject { font-size: 13.5px; font-weight: 600; color: #783D19; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tl-preview { font-size: 12px; color: #9a7f61; margin-top: 2px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* Themes */
    .theme-card { background: #fff; border: 1px solid #E6DFD3; border-radius: 8px; padding: 13px 15px; margin-bottom: 10px; border-left: 3px solid #5F6F52; box-shadow: 0 2px 4px rgba(120,61,25,0.05); }
    .theme-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .theme-name { font-size: 14px; font-weight: 700; color: #783D19; flex: 1; }
    .theme-count { font-size: 11px; color: #C4B393; }
    .theme-count-toggle { cursor: pointer; user-select: none; }
    .theme-count-toggle:hover { color: #5F6F52; }
    .theme-toggle-arrow { font-size: 9px; }
    .theme-status { font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 10px; }
    .s-open { background: #F8EBD9; color: #C4661F; }
    .s-done { background: #E7ECDB; color: #5F6F52; }
    .theme-summary { font-size: 12.5px; color: #7a5c40; line-height: 1.5; }
    .theme-interactions { margin-top: 8px; border-top: 1px solid #E6DFD3; padding-top: 6px; }
    .theme-interaction { display: flex; gap: 8px; align-items: baseline; padding: 3px 0; font-size: 12px; color: #6b4f38; }
    a.ti-link { text-decoration: none; color: inherit; border-radius: 4px; }
    a.ti-link:hover { background: #F9EBC7; }
    a.ti-link:hover .ti-subject { text-decoration: underline; color: #5F6F52; }
    .ti-icon { flex-shrink: 0; font-size: 11px; }
    .ti-date { color: #C4B393; flex-shrink: 0; font-size: 11px; min-width: 72px; }
    .ti-subject { flex: 1; }

    /* Background */
    .bg-box { background: #fff; border: 1px solid #E6DFD3; border-radius: 12px; padding: 18px 20px; line-height: 1.8; font-size: 13.5px; color: #6b4f38; box-shadow: 0 2px 4px rgba(120,61,25,0.05); }

    /* Sentiment */
    .sentiment { display: inline-flex; align-items: center; gap: 4px; }
    .s-dot { width: 8px; height: 8px; border-radius: 50%; }
    .s-pos { background: #5F6F52; }
    .s-neu { background: #B99470; }
    .s-neg { background: #9b4a2a; }

    /* Loading */
    .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: #B99470; }
    .spinner { width: 36px; height: 36px; border: 3px solid #EFE6D3; border-top-color: #5F6F52; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; }

    /* No key */
    .no-key-box { text-align: center; padding: 36px 24px; }
    .no-key-icon { font-size: 42px; margin-bottom: 14px; }
    .no-key-title { font-size: 16px; font-weight: 800; color: #783D19; margin-bottom: 8px; }
    .no-key-desc { font-size: 13px; color: #7a5c40; line-height: 1.65; }

    .error-box { background: #F6E1D6; border: 1px solid #E8C9BC; border-radius: 9px; padding: 14px 16px; font-size: 13px; color: #9b4a2a; }
    .empty-state { text-align: center; padding: 40px 20px; color: #C4B393; font-size: 13px; line-height: 1.6; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-name" id="headerName">…</div>
    <div class="header-meta" id="headerMeta"><span style="color:#C9B79A;font-size:10px">v20260701a</span></div>
  </div>

  <!-- Settings: Zeitraum (KI-Provider wird zentral vom Admin in tembu-server verwaltet) -->
  <div class="settings-bar">
    <select class="settings-input" id="sinceSelect" style="flex:0;min-width:80px;width:auto;padding:5px 7px">
      <option value="6" data-i18n="common.since6Months">6 months</option>
      <option value="12" data-i18n="common.since1Year">1 year</option>
      <option value="24" data-i18n="common.since2Years">2 years</option>
      <option value="60" data-i18n="common.since5Years">5 years</option>
      <option value="0" data-i18n="common.sinceAll">All</option>
    </select>
    <button class="settings-btn" id="btnAnalyze" onclick="forceRefresh()" style="margin-left:4px" data-i18n="detail.analyzeButton">Analyze</button>
  </div>

  <!-- Tabs -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tabBtnTimeline"    onclick="showTab('Timeline')" data-i18n="detail.tabTimeline">Timeline</button>
    <button class="tab-btn"        id="tabBtnThemes"      onclick="showTab('Themes')" data-i18n="detail.tabThemes">Themes</button>
    <button class="tab-btn"        id="tabBtnBackground"  onclick="showTab('Background')" data-i18n="detail.tabBackground">Background</button>
  </div>

  <!-- Tab: Timeline -->
  <div class="tab-content" id="tabTimeline">
    <div id="tlLoading" class="loading-wrap">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText" data-i18n="detail.loadingData">Loading data…</div>
    </div>
    <div id="tlContent" class="hidden">
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num" id="statEmails">0</div><div class="stat-label" data-i18n="detail.statEmails">Emails</div></div>
        <div class="stat-box"><div class="stat-num" id="statMeetings">0</div><div class="stat-label" data-i18n="detail.statMeetings">Meetings</div></div>
        <div class="stat-box"><div class="stat-num" id="statRumbles">0</div><div class="stat-label" data-i18n="detail.statRumbles">Rumbles</div></div>
      </div>
      <div id="aiBox" class="hidden">
        <div class="ai-box">
          <div class="ai-label"><span data-i18n="detail.aiLabel">AI Summary</span></div>
          <div class="ai-text" id="aiSummaryText"></div>
          <div class="ai-next hidden" id="aiNextStep"><strong data-i18n="detail.nextStepLabel">Next step:</strong> <span id="aiNextStepText"></span></div>
        </div>
        <div id="openPointsBox" class="hidden">
          <div class="section-title" data-i18n="detail.openPointsTitle">Open points</div>
          <div id="openPointsList"></div>
        </div>
      </div>
      <div id="noKeyBox" class="hidden">
        <div class="no-key-box">
          <div class="no-key-icon">🔑</div>
          <div class="no-key-title" id="noKeyTitle" data-i18n="detail.aiUnavailableTitle">AI analysis unavailable</div>
          <div class="no-key-desc" id="noKeyDesc" data-i18n="detail.noKeyDesc" data-i18n-html="true">AI analysis is managed centrally. Ask your Tembu admin to set it up.</div>
        </div>
      </div>
      <div class="cache-info hidden" id="cacheInfo">
        <span id="cacheInfoText"></span>
        <span class="refresh-link" onclick="forceRefresh()" data-i18n="detail.refreshLink">↻ Refresh</span>
      </div>
      <div class="section-title" id="sinceLabel">Interactions (last 2 years)</div>
      <div id="timelineList"></div>
    </div>
  </div>

  <!-- Tab: Themes -->
  <div class="tab-content hidden" id="tabThemes">
    <div id="themesContent"><div class="loading-wrap"><div class="spinner"></div></div></div>
  </div>

  <!-- Tab: Background -->
  <div class="tab-content hidden" id="tabBackground">
    <div id="backgroundContent"><div class="empty-state" data-i18n="detail.backgroundPendingLocal">Background will load after analysis.</div></div>
  </div>

  <script src="../shared/tembu-core.js?v=20260701i"></script>
  <script src="detail.js?v=20260701i"></script>
</body>
</html>
