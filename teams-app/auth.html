<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Tembu Auth</title>
  <script src="lib/msal-browser.min.js"></script>
</head>
<body>
<script>
// MSAL redirect handler for loginPopup() flow.
// MSAL in the parent (meeting.html) opened this popup and monitors it.
// handleRedirectPromise() processes the auth code and notifies the parent
// automatically via window.opener.postMessage.
const msalInstance = new msal.PublicClientApplication({
  auth: {
    clientId: '6a0f7ccb-afe3-4045-9b45-721d2046fafb',
    authority: 'https://login.microsoftonline.com/common',
    redirectUri: 'https://gkaufmannzh.github.io/tembu.app/teams-app/auth.html',
  },
  cache: { cacheLocation: 'sessionStorage' },
});

(async () => {
  if (msalInstance.initialize) await msalInstance.initialize();
  await msalInstance.handleRedirectPromise();
})().catch(() => {});
</script>
</body>
</html>
