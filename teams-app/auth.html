<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Tembu Anmeldung</title>
  <script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; background: #f5f5f5; color: #333; font-size: 14px; }
    #status { text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <div id="status">Prüfe Anmeldung…</div>
<script>
const CLIENT_ID    = '6a0f7ccb-afe3-4045-9b45-721d2046fafb';
const REDIRECT_URI = 'https://gkaufmannzh.github.io/tembu.app/teams-app/auth.html';
const SCOPES       = 'User.Read Tasks.Read';

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function notifySuccess(token) {
  try { microsoftTeams.authentication.notifySuccess(token); } catch (_) {
    if (window.opener) window.opener.postMessage({ type: 'auth-success', token }, '*');
  }
}

function notifyFailure(msg) {
  try { microsoftTeams.authentication.notifyFailure(msg); } catch (_) {
    if (window.opener) window.opener.postMessage({ type: 'auth-failure', error: msg }, '*');
  }
}

// Parse URL hash (implicit flow returns token in fragment)
const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
const token = hash.get('access_token');
const error = hash.get('error');
const errorDesc = hash.get('error_description');

if (error) {
  setStatus('Fehler: ' + errorDesc);
  notifyFailure(error + ': ' + errorDesc);
} else if (token) {
  setStatus('Angemeldet! Fenster wird geschlossen…');
  // Send token directly to opener (meeting.html listens for this)
  if (window.opener) {
    window.opener.postMessage({ tembuToken: token }, 'https://gkaufmannzh.github.io');
  }
  // Also try Teams SDK path (works if app.initialize resolved)
  try { microsoftTeams.authentication.notifySuccess(token); } catch (_) {}
  // Close popup after short delay
  setTimeout(() => window.close(), 300);
} else {
  // No token yet — redirect to Microsoft login
  setStatus('Weiterleitung zu Microsoft…');
  const url = new URL('https://login.microsoftonline.com/common/oauth2/v2.0/authorize');
  url.searchParams.set('client_id', CLIENT_ID);
  url.searchParams.set('response_type', 'token');
  url.searchParams.set('redirect_uri', REDIRECT_URI);
  url.searchParams.set('scope', SCOPES);
  url.searchParams.set('response_mode', 'fragment');
  url.searchParams.set('prompt', 'select_account');
  window.location.href = url.toString();
}
</script>
</body>
</html>
