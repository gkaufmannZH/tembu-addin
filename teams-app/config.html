<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js"></script>
  <script>
    microsoftTeams.app.initialize().then(() => {
      microsoftTeams.pages.config.registerOnSaveHandler((saveEvent) => {
        microsoftTeams.pages.config.setConfig({
          suggestedDisplayName: 'Tembu',
          contentUrl: 'https://tembu-app-l29s.vercel.app/teams-app/meeting.html',
          websiteUrl: 'https://tembu-app-l29s.vercel.app/teams-app/meeting.html',
        });
        saveEvent.notifySuccess();
      });
      microsoftTeams.pages.config.setValidityState(true);
    });
  </script>
</head>
<body style="font-family:sans-serif;padding:20px;color:#1a1a1a">
  <h3 style="color:#2d5a5a">Tembu Rumbles</h3>
  <p>Zeigt deine Rumbles für Meeting-Teilnehmer im Seitenbereich.</p>
  <p>Klicke Speichern um Tembu zu diesem Meeting hinzuzufügen.</p>
</body>
</html>
