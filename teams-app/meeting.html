<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tembu Rumbles</title>
  <script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js"></script>
  <script src="https://alcdn.msauth.net/browser/2.39.0/js/msal-browser.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      font-size: 14px;
    }
    .header {
      background: #2d5a5a;
      color: #fff;
      padding: 12px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title { font-size: 15px; font-weight: 700; }
    .search-wrap { padding: 10px 14px; background: #fff; border-bottom: 1px solid #eee; }
    .search {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
    }
    .search:focus { border-color: #2d5a5a; }

    .section { margin: 10px 0; }
    .section-header {
      background: #fff;
      padding: 10px 14px 8px;
      border-top: 1px solid #eee;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #2d5a5a;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0;
    }
    .contact-name { font-weight: 600; font-size: 14px; }
    .rumble-count { font-size: 11px; color: #888; margin-left: auto; }

    .rumble-item {
      background: #fff;
      padding: 10px 14px 10px 56px;
      border-bottom: 1px solid #f0f0f0;
    }
    .rumble-text { font-size: 13px; color: #1a1a1a; line-height: 1.4; }
    .rumble-meta { font-size: 11px; color: #aaa; margin-top: 3px; }
    .rumble-source {
      display: inline-block;
      margin-top: 4px;
      font-size: 11px;
      color: #2d5a5a;
      text-decoration: none;
    }
    .rumble-source:hover { text-decoration: underline; }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #aaa;
      font-size: 13px;
    }
    .status {
      padding: 12px 14px;
      font-size: 13px;
      color: #666;
      background: #fff;
      border-bottom: 1px solid #eee;
    }
    .btn-connect {
      display: block;
      margin: 20px 14px 0;
      background: #2d5a5a;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      width: calc(100% - 28px);
    }
    .btn-connect:hover { opacity: 0.88; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">Tembu Rumbles <span style="font-size:10px;opacity:0.6">v6</span></div>
  </div>

  <div id="notSignedIn">
    <div class="status">Mit Microsoft anmelden um deine Rumbles zu sehen.</div>
    <button class="btn-connect" id="btnSignIn">Mit Microsoft anmelden</button>
  </div>

  <div id="signedIn" class="hidden">
    <div class="search-wrap">
      <input class="search" id="searchInput" type="text" placeholder="Kontakt suchen…" />
    </div>
    <div id="rumbleList"></div>
  </div>

  <script>
    window.onerror = function(msg, src, line) {
      document.querySelector('.status').textContent = 'JS Fehler: ' + msg + ' (' + src?.split('/').pop() + ':' + line + ')';
    };
  </script>
  <script src="meeting.js"></script>
</body>
</html>
