<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tembu Rumbles</title>
  <script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
  <script src="lib/msal-browser.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      font-size: 14px;
    }
    .header {
      background: #2d5a5a;
      color: #fff;
      padding: 12px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title { font-size: 15px; font-weight: 700; }

    .section { margin: 10px 0; }
    .section-header {
      background: #fff;
      padding: 10px 14px 8px;
      border-top: 1px solid #eee;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #2d5a5a;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0;
    }
    .contact-name { font-weight: 600; font-size: 14px; }
    .rumble-count { font-size: 11px; color: #888; margin-left: auto; }

    .rumble-item {
      background: #fff;
      padding: 10px 14px 10px 56px;
      border-bottom: 1px solid #f0f0f0;
    }
    .rumble-text { font-size: 13px; color: #1a1a1a; line-height: 1.4; }
    .rumble-meta { font-size: 11px; color: #aaa; margin-top: 3px; }
    .rumble-source {
      display: inline-block;
      margin-top: 4px;
      font-size: 11px;
      color: #2d5a5a;
      text-decoration: none;
    }
    .rumble-source:hover { text-decoration: underline; }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #aaa;
      font-size: 13px;
    }
    .status {
      padding: 12px 14px;
      font-size: 13px;
      color: #666;
      background: #fff;
      border-bottom: 1px solid #eee;
    }
    .btn-connect {
      display: block;
      margin: 20px 14px 0;
      background: #2d5a5a;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      width: calc(100% - 28px);
    }
    .btn-connect:hover { opacity: 0.88; }
    .hidden { display: none !important; }
    .chat-section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #2d5a5a;
      padding: 10px 14px 4px;
    }

    /* Notes panel */
    .search-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #fff;
      border-bottom: 1px solid #eee;
    }
    .search {
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
    }
    .search:focus { border-color: #2d5a5a; }
    .btn-notes-toggle {
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      color: #2d5a5a;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;
    }
    .btn-notes-toggle:hover { background: #f0f5f5; }
    .notes-panel {
      padding: 12px 14px;
      background: #fff;
      border-bottom: 1px solid #eee;
    }
    .notes-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #2d5a5a;
      margin-bottom: 6px;
    }
    .notes-input {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      resize: vertical;
      min-height: 90px;
      font-family: inherit;
      outline: none;
    }
    .notes-input:focus { border-color: #2d5a5a; }
    .notes-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      gap: 8px;
    }
    .notes-participant-hint {
      font-size: 11px;
      color: #888;
      flex: 1;
    }
    .btn-notes-save {
      background: #2d5a5a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-notes-save:hover { opacity: 0.88; }
    .btn-notes-save:disabled { opacity: 0.45; cursor: not-allowed; }
    .notes-status {
      font-size: 12px;
      color: #2d6a2d;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">Tembu Rumbles <span style="font-size:10px;opacity:0.6">v17</span></div>
  </div>

  <div id="notSignedIn">
    <div class="status">Mit Microsoft anmelden um deine Rumbles zu sehen.</div>
    <button class="btn-connect" id="btnSignIn">Mit Microsoft anmelden</button>
  </div>

  <div id="signedIn" class="hidden">
    <div class="search-toolbar" id="searchWrap">
      <input class="search" id="searchInput" type="text" placeholder="Kontakt suchen…" />
      <button class="btn-notes-toggle" id="btnNotes">📝 Notizen</button>
    </div>

    <!-- Meeting-Notizen Panel (Point 5) -->
    <div class="notes-panel hidden" id="notesPanel">
      <div class="notes-label">Meeting-Notizen → Rumbles</div>
      <textarea class="notes-input" id="notesInput" placeholder="Notizen aus dem Meeting eingeben. Für jeden Teilnehmer wird ein Rumble erstellt."></textarea>
      <div class="notes-footer">
        <span class="notes-participant-hint" id="notesParticipantHint"></span>
        <button class="btn-notes-save" id="btnCreateRumbles">Rumbles erstellen</button>
      </div>
      <div class="notes-status" id="notesStatus"></div>
    </div>

    <div id="rumbleList"></div>
  </div>

  <script>
    window.onerror = function(msg, src, line) {
      document.querySelector('.status').textContent = 'JS Fehler: ' + msg + ' (' + src?.split('/').pop() + ':' + line + ')';
    };
  </script>
  <script src="meeting.js"></script>
</body>
</html>
