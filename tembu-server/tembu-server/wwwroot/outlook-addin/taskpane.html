<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tembu Rumble</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script src="lib/msal-browser.min.js?v=20260608"></script>
  <script src="../shared/i18n.js?v=20260701i"></script>
  <style>
    /* ===== Tembu warm theme (Cornsilk / Russet / Olive) ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: #FEFAE0;
      color: #783D19;
      font-size: 14px;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #FEFAE0;
      color: #783D19;
      padding: 14px 16px 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
      border-bottom: 1px solid #E6DFD3;
    }
    .header-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
    .header-sub { font-size: 12px; color: #B99470; margin-top: 3px; }

    /* Sign-in state: full width */
    .pane { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    /* Signed-in state: sidebar layout */
    .app-body { display: flex; flex: 1; overflow: hidden; }

    /* Left sidebar — now warm & light */
    .sidebar {
      width: 66px;
      background: #F9EBC7;
      border-right: 1px solid #E6DFD3;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      padding-top: 6px;
    }
    .sidebar-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 4px;
      cursor: pointer;
      color: #B99470;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      text-align: center;
      gap: 5px;
      border-left: 3px solid transparent;
      transition: color 0.15s, background 0.15s;
      user-select: none;
    }
    .sidebar-item:hover { color: #8a7a5c; background: rgba(95,111,82,0.06); }
    .sidebar-item.active { color: #5F6F52; border-left-color: #5F6F52; background: rgba(95,111,82,0.11); }
    .sidebar-icon { line-height: 0; display: flex; }
    .sidebar-icon svg { width: 21px; height: 21px; }
    .sidebar-group {
      font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.6px;
      color: #C9B79A; text-align: center; padding: 6px 4px 2px;
    }
    .sidebar-sep { border: none; border-top: 1px solid #E6DFD3; margin: 6px 12px; }

    /* Right content area */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 13px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Fields */
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #B99470;
      margin-bottom: 5px;
    }
    .field input, .field textarea {
      width: 100%;
      border: 1.5px solid #E6DFD3;
      border-radius: 9px;
      padding: 10px 12px;
      font-size: 14px;
      color: #783D19;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .field input:focus, .field textarea:focus { border-color: #5F6F52; background: #fff; }
    .field textarea { resize: vertical; min-height: 82px; line-height: 1.5; }

    .source-badge {
      display: flex; align-items: center; gap: 8px;
      background: #F9EBC7; border: 1px solid #E6DFD3;
      border-radius: 9px; padding: 8px 11px; font-size: 12px; color: #5F6F52;
    }
    .source-badge .source-type { font-weight: 600; }
    .source-badge .source-subject { opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .btn-save {
      background: #5F6F52;
      color: #FEFAE0;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.1px;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-save svg { width: 18px; height: 18px; }
    .btn-save:hover { background: #556348; }
    .btn-save:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-outline {
      background: #fff;
      color: #5F6F52;
      border: 1.5px solid #5F6F52;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.1px;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-outline svg { width: 18px; height: 18px; }
    .btn-outline:hover { background: #F9EBC7; }
    .btn-outline:disabled { opacity: 0.45; cursor: not-allowed; }

    .status {
      font-size: 13px; padding: 10px 12px; border-radius: 9px; text-align: center;
    }
    .status.success { background: #E7ECDB; color: #4b5a3a; }
    .status.error   { background: #F6E1D6; color: #9b4a2a; }
    .status.info    { background: #F9EBC7; color: #5F6F52; }

    .user-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #B99470; }
    .btn-signout {
      background: none; border: none; color: #5F6F52;
      font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: underline;
    }

    /* Rumble browse */
    .rumble-search {
      width: 100%; border: 1.5px solid #E6DFD3; border-radius: 9px;
      padding: 9px 12px; font-size: 13px; color: #783D19; outline: none; margin-bottom: 10px;
    }
    .rumble-search:focus { border-color: #5F6F52; }
    .rumble-group { margin-bottom: 8px; }
    .rumble-group-name {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.4px; color: #5F6F52; padding: 5px 0 4px;
      border-bottom: 1px solid #ECE3D0; margin-bottom: 4px;
    }
    .rumble-row {
      font-size: 13px; color: #5a4632; padding: 6px 0; line-height: 1.4;
      border-bottom: 1px solid #F3ECDC;
    }
    .rumble-row:last-child { border-bottom: none; }
    .rumble-empty { font-size: 13px; color: #C4B393; text-align: center; padding: 20px 0; }
    #rumbleBrowsePanel { max-height: 60vh; overflow-y: auto; }

    /* Meeting briefing */
    .briefing-label {
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.5px; color: #5F6F52; margin-bottom: 6px;
    }
    #briefingSection {
      background: #F9EBC7; border: 1px solid #E6DFD3;
      border-radius: 9px; padding: 10px 11px; margin-top: 4px;
    }
    .briefing-item {
      display: flex; flex-direction: column; gap: 2px;
      padding: 5px 0; border-bottom: 1px solid #E6DFD3;
    }
    .briefing-item:last-child { border-bottom: none; }
    .briefing-name { font-size: 12px; font-weight: 600; color: #5F6F52; }
    .briefing-text { font-size: 12px; color: #6b4f38; }

    /* Follow-up task */
    .followup-check-label {
      display: flex; align-items: center; gap: 9px; cursor: pointer;
      font-size: 13px; color: #783D19;
    }
    .followup-check-label input[type="checkbox"] {
      width: 16px; height: 16px; cursor: pointer; accent-color: #5F6F52; flex-shrink: 0;
    }
    .followup-input {
      width: 100%; border: 1.5px solid #E6DFD3; border-radius: 8px;
      padding: 7px 10px; font-size: 13px; color: #783D19;
      background: #fff; outline: none; font-family: inherit;
      resize: vertical; min-height: 52px; box-sizing: border-box;
    }
    .followup-input:focus { border-color: #5F6F52; }
    .followup-date {
      width: 100%; border: 1.5px solid #E6DFD3; border-radius: 8px;
      padding: 7px 10px; font-size: 13px; color: #783D19;
      background: #fff; outline: none; font-family: inherit; box-sizing: border-box;
    }
    .followup-date:focus { border-color: #5F6F52; }
    .followup-options { margin-top: 6px; display: flex; flex-direction: column; gap: 6px; }

    /* Mail contacts */
    .mail-contacts-label {
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.5px; color: #B99470; margin-bottom: 6px;
    }
    .mail-contact-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 11px; background: #fff; border: 1px solid #E6DFD3;
      border-radius: 9px; margin-bottom: 5px; cursor: pointer; gap: 8px;
      transition: background 0.12s, border-color 0.12s;
    }
    .mail-contact-row:hover { background: #F9EBC7; }
    .mail-contact-row.selected { background: #5F6F52; border-color: #5F6F52; }
    .mail-contact-name { font-size: 13px; font-weight: 500; flex: 1; color: #783D19; }
    .mail-contact-row.selected .mail-contact-name { color: #FEFAE0; font-weight: 600; }
    .mail-contact-badge {
      font-size: 10px; font-weight: 700; color: #8a7a5c;
      background: #F1E7CF; border-radius: 5px; padding: 2px 7px; flex-shrink: 0;
    }
    .mail-contact-row.selected .mail-contact-badge { color: #FEFAE0; background: rgba(255,255,255,0.22); }

    /* Contact dropdown */
    .contact-dropdown {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #fff; border: 1.5px solid #5F6F52; border-top: none;
      border-radius: 0 0 9px 9px; max-height: 200px; overflow-y: auto;
      z-index: 100; box-shadow: 0 6px 16px rgba(120,61,25,0.12);
    }
    .contact-picker-row {
      padding: 8px 11px; cursor: pointer; border-bottom: 1px solid #F3ECDC;
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .contact-picker-row:hover { background: #F9EBC7; }
    .contact-picker-row:last-child { border-bottom: none; }
    .contact-picker-name { font-size: 13px; color: #783D19; font-weight: 500; flex: 1; }
    .contact-picker-phone { font-size: 11px; color: #B99470; flex-shrink: 0; }
    .context-contact { background: #F9EBC7; }
    .context-contact:hover { background: #F1E7CF; }
    .contact-context-badge {
      font-size: 10px; font-weight: 700; color: #5F6F52;
      background: #E7ECDB; border-radius: 5px; padding: 2px 6px; flex-shrink: 0;
    }
    .contact-picker-divider { height: 1px; background: #E6DFD3; margin: 2px 0; }

    /* Participant picker */
    .participant-picker-label { font-size: 11px; font-weight: 600; color: #B99470; margin-bottom: 4px; }
    .participant-chip {
      display: inline-block; margin: 2px 4px 2px 0; padding: 5px 12px;
      border: 1.5px solid #5F6F52; border-radius: 20px; font-size: 12px;
      color: #5F6F52; cursor: pointer; background: none; font-family: inherit;
    }
    .participant-chip:hover { background: #F9EBC7; }
    .participant-chip.active { background: #5F6F52; color: #FEFAE0; }
    .participant-chip.active:hover { background: #556348; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-title">Tembu <span id="buildLabel" style="font-size:10px;color:#C9B79A;font-weight:400"></span></div>
      <div class="header-sub" data-i18n="taskpane.headerSub">Rumble erstellen</div>
    </div>
  </div>

  <!-- Not signed in -->
  <div id="signInSection" class="pane">
    <div class="status info" data-i18n="taskpane.signInInfo">Microsoft-Konto verbinden um Rumbles zu speichern.</div>
    <button class="btn-save" id="btnSignIn" data-i18n="taskpane.signInButton">Mit Microsoft anmelden</button>
  </div>

  <!-- Signed in: sidebar layout -->
  <div id="formSection" class="app-body hidden">

    <!-- Left sidebar navigation (Outline-Icons statt Emoji) -->
    <nav class="sidebar">
      <!-- NOTE: this tab's internal id/handler stay "rumble" (the note-taking feature name) —
           only the visible label changes to "Contact"/"Kontakt"/"Contact"/"Contacto". -->
      <div class="sidebar-item active" id="tabRumble" onclick="showTab('rumble')">
        <span class="sidebar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l4 4v14H6z"></path><path d="M14 3v5h5"></path><path d="M9 13h7M9 17h5"></path></svg></span>
        <span data-i18n="taskpane.tabRumbleLabel">Contact</span>
      </div>
      <hr class="sidebar-sep" />
      <div class="sidebar-group" data-i18n="taskpane.sidebarGroupAnalysis">Analyse</div>
      <div class="sidebar-item" id="tabCompany" onclick="showTab('company')">
        <span class="sidebar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V6a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v15"></path><path d="M14 21V11h5a1 1 0 0 1 1 1v9"></path><path d="M3 21h18M7.5 9h3M7.5 13h3M7.5 17h3"></path></svg></span>
        <span data-i18n="taskpane.tabCompanyLabel">Company</span>
      </div>
      <div class="sidebar-item" id="tabRelations" onclick="showTab('relations')">
        <span class="sidebar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.2"></circle><circle cx="18" cy="6" r="2.2"></circle><circle cx="12" cy="18" r="2.2"></circle><path d="M7.6 7.4 10.4 16.2M16.4 7.4 13.6 16.2M8.2 6h7.6"></path></svg></span>
        <span data-i18n="taskpane.tabRelationsDefault">Relations</span>
      </div>
      <div class="sidebar-item" id="tabSettings" onclick="showTab('settings')">
        <span class="sidebar-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.1"></circle><path d="M12 3.4v2.3M12 18.3v2.3M20.6 12h-2.3M5.7 12H3.4M18.1 5.9l-1.6 1.6M7.5 16.5 5.9 18.1M18.1 18.1l-1.6-1.6M7.5 7.5 5.9 5.9"></path></svg></span>
        <span data-i18n="taskpane.tabSettingsLabel">Setup</span>
      </div>
    </nav>

    <!-- Right content area -->
    <div class="content-area">

      <div class="user-row">
        <span id="userLabel"></span>
        <button class="btn-signout" id="btnSignOut" data-i18n="taskpane.signOutButton">Sign out</button>
      </div>

      <!-- Tab: Rumble (note-taking feature, distinct from the renamed "Contact" nav tab above) -->
      <div id="rumblePane">

        <div id="mailContactsSection" class="hidden">
          <div class="mail-contacts-label" data-i18n="taskpane.mailContactsLabel">From this email</div>
          <div id="mailContactsList"></div>
        </div>

        <div id="briefingSection" class="hidden">
          <div class="briefing-label" data-i18n="taskpane.briefingLabel">Rumbles for this meeting</div>
          <div id="briefingList"></div>
        </div>

        <div class="field" style="margin-top:4px">
          <label data-i18n="taskpane.fieldContactLabel">Contact</label>
          <div style="position:relative">
            <input type="text" id="contactName" placeholder="Search contact…" data-i18n-placeholder="taskpane.contactSearchPlaceholder" autocomplete="off"
                   oninput="filterContactDropdown(this.value)"
                   onfocus="openContactDropdown()"
                   onblur="closeContactDropdownDelayed()" />
            <div id="contactDropdown" class="contact-dropdown hidden" onmousedown="event.preventDefault()"></div>
          </div>
        </div>

        <div id="participantPicker" class="hidden" style="margin:-6px 0 6px">
          <div class="participant-picker-label" data-i18n="taskpane.participantPickerLabel">Who is this Rumble for?</div>
          <div id="participantChips"></div>
        </div>

        <button class="btn-save" id="btnSave" style="margin-top:4px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"></path></svg>
          <span data-i18n="taskpane.rumbleSaveButton">Add Rumble</span>
        </button>

        <div class="field hidden" id="contactPhoneField">
          <label><span data-i18n="taskpane.fieldPhoneLabel">Phone number</span> <span style="font-weight:400;color:#C9B79A" data-i18n="taskpane.fieldPhoneHint">(for proximity detection)</span></label>
          <input type="tel" id="contactPhone" placeholder="+41 79 123 45 67" />
        </div>

        <div class="field hidden" id="rumbleTextField">
          <label data-i18n="taskpane.fieldRumbleLabel">Rumble</label>
          <textarea id="rumbleText" placeholder="What would you like to discuss at the next meeting?" data-i18n-placeholder="taskpane.rumbleTextPlaceholder"></textarea>
        </div>

        <div id="followUpSection" class="hidden" style="margin-top:8px">
          <label class="followup-check-label">
            <input type="checkbox" id="followUpCheck" onchange="toggleFollowUpOptions()" />
            <span data-i18n="taskpane.followUpCheckLabel">Save as Outlook task</span>
          </label>
          <div id="followUpOptions" class="hidden followup-options">
            <textarea class="followup-input" id="followUpNote" placeholder="Task or note about the conversation…" data-i18n-placeholder="taskpane.followUpNotePlaceholder"></textarea>
            <input type="datetime-local" id="followUpDate" class="followup-date" />
          </div>
        </div>

        <button class="btn-save hidden" id="btnSaveRumble" style="margin-top:8px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"></path></svg>
          <span data-i18n="taskpane.rumbleSaveActionButton">Save Rumble</span>
        </button>

        <button class="btn-outline" id="btnAnalyzeContact" style="margin-top:8px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path></svg>
          <span data-i18n="taskpane.analyzeContactButton">Analyze Contact</span>
        </button>

      </div><!-- end #rumblePane -->

      <div id="companyPane" class="hidden">
        <div class="rumble-empty" style="padding-top:40px" data-i18n="taskpane.companyPanePlaceholder">Company analysis — coming soon.</div>
      </div>
      <div id="relationsPane" class="hidden">
        <input class="rumble-search" id="rumbleSearch" type="text" placeholder="Search contact…" data-i18n-placeholder="taskpane.contactSearchPlaceholder" oninput="filterRumbles(this.value)" />
        <div id="rumbleBrowsePanel"><div class="rumble-empty" data-i18n="taskpane.relationsLoading">Loading…</div></div>
      </div>
      <div id="settingsPane" class="hidden">
        <div class="field" style="margin-top:4px">
          <label data-i18n="taskpane.languageLabel">Language</label>
          <select id="langSelect" onchange="onLangChange(this.value)" style="width:100%;border:1.5px solid #E6DFD3;border-radius:9px;padding:10px 12px;font-size:14px;color:#783D19;background:#fff;outline:none;font-family:inherit">
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
          </select>
        </div>
        <div class="field" style="margin-top:12px">
          <label data-i18n="taskpane.serverUrlLabel">Tembu Server URL</label>
          <input type="text" id="serverUrlInput" placeholder="https://localhost:5001" data-i18n-placeholder="taskpane.serverUrlPlaceholder" autocomplete="off"
                 onchange="onServerUrlChange(this.value)"
                 style="width:100%;border:1.5px solid #E6DFD3;border-radius:9px;padding:10px 12px;font-size:14px;color:#783D19;background:#fff;outline:none;font-family:inherit" />
          <div style="font-size:11px;color:#B99470;margin-top:5px" data-i18n="taskpane.serverUrlHint">Set by your Tembu admin — used for AI contact analysis.</div>
        </div>
      </div>

      <div class="status hidden" id="statusMsg"></div>

      <!-- Diagnose -->
      <div style="margin-top:4px;border-top:1px solid #E6DFD3;padding-top:8px">
        <button id="btnDiag" style="background:none;border:1px solid #E6DFD3;border-radius:8px;padding:5px 10px;font-size:11px;color:#B99470;cursor:pointer;width:100%" data-i18n="taskpane.diagButton">Diagnostics</button>
        <pre id="diagOut" style="font-size:10px;color:#6b4f38;background:#F9EBC7;border-radius:8px;padding:8px;margin-top:6px;white-space:pre-wrap;display:none"></pre>
      </div>

    </div><!-- end .content-area -->
  </div><!-- end #formSection -->

  <script src="../shared/version.js?v=20260701i"></script>
  <script src="taskpane.js?v=20260701i"></script>
  <script>document.getElementById('buildLabel').textContent = TEMBU_BUILD;</script>
</body>
</html>
